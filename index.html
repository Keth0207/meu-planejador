<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Planejador</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f5f7;
}

header {
  background: #026aa7;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  display: flex;
  overflow-x: auto;
  padding: 15px;
  gap: 15px;
}

.coluna {
  background: #ebecf0;
  border-radius: 8px;
  min-width: 260px;
  padding: 10px;
}

.coluna h3 {
  margin-top: 0;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 6px;
  margin-bottom: 10px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}

.dashboard {
  padding: 15px;
}

.dashboard-box {
  background: white;
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>
  <h2>Meu Planejador de Tarefas</h2>
</header>

<div class="container">
  <div class="coluna">
    <h3>A Fazer</h3>
    <div class="card">Tarefa 1</div>
    <div class="card">Tarefa 2</div>
  </div>

  <div class="coluna">
    <h3>Em Andamento</h3>
    <div class="card">Tarefa 3</div>
  </div>

  <div class="coluna">
    <h3>Concluído</h3>
    <div class="card">Tarefa 4</div>
  </div>
</div>

<div class="dashboard">
  <h3>Dashboard</h3>
  <div class="dashboard-box">📌 Total de tarefas: 4</div>
  <div class="dashboard-box">⏳ Em andamento: 1</div>
  <div class="dashboard-box">✅ Concluídas: 1</div>
</div>

</body>
</html>
