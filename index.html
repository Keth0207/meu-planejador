<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meu Planejador</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

h1 {
  text-align: center;
  padding: 10px;
}

button {
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.board {
  display: flex;
  gap: 12px;
  padding: 12px;
  overflow-x: auto;
}

.column {
  background: #1e293b;
  min-width: 260px;
  border-radius: 10px;
  padding: 10px;
}

.column-title {
  text-align: center;
  font-weight: bold;
}

.cards {
  min-height: 60px;
}

.card {
  background: #334155;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
}

.card.done {
  background: #16a34a;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: #1e293b;
  width: 95%;
  max-width: 480px;
  padding: 16px;
  border-radius: 10px;
}

textarea {
  width: 100%;
  min-height: 70px;
  border-radius: 6px;
}
</style>
</head>

<body>

<h1>📋 Meu Planejador</h1>

<div style="text-align:center">
  <button onclick="addColumn()">+ Nova coluna</button>
</div>

<div class="board" id="board"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 contenteditable id="modalTitle"></h3>

    <h4>📝 Descrição / Links</h4>
    <textarea id="modalDesc" placeholder="Cole aqui links do Google Drive, Docs, etc"></textarea>

    <h4>☑️ Subtarefas</h4>
    <div id="subtasks"></div>
    <button onclick="addSubtask()">+ Subtarefa</button>

    <h4>🔗 Vincular outra tarefa</h4>
    <button onclick="linkTask()">➕ Vincular</button>

    <br><br>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
let columnCount = 0;
let activeCard = null;

function addColumn() {
  if (columnCount >= 25) {
    alert("Limite máximo de 25 colunas atingido.");
    return;
  }

  columnCount++;

  const col = document.createElement("div");
  col.className = "column";

  const title = document.createElement("div");
  title.className = "column-title";
  title.contentEditable = true;
  title.textContent = "Nova coluna";

  const cards = document.createElement("div");
  cards.className = "cards";

  const btn = document.createElement("button");
  btn.textContent = "+ Tarefa";
  btn.onclick = () => addCard(cards);

  col.append(title, cards, btn);
  board.appendChild(col);
}

function addCard(container) {
  const card = document.createElement("div");
  card.className = "card";

  card.titleText = "Nova tarefa";
  card.description = "";
  card.subtasks = [];

  card.textContent = card.titleText;

  card.onclick = () => openModal(card);
  container.appendChild(card);

  updateDone(container);
}

function updateDone(container) {
  const colTitle = container.parentElement
    .querySelector(".column-title").textContent.toLowerCase();

  [...container.children].forEach(card => {
    card.classList.toggle("done", colTitle.includes("conclu"));
  });
}

/* MODAL */
function openModal(card) {
  activeCard = card;
  modalTitle.innerText = card.titleText;
  modalDesc.value = card.description;
  renderSubtasks();
  modal.style.display = "flex";
}

function closeModal() {
  activeCard.titleText = modalTitle.innerText;
  activeCard.description = modalDesc.value;
  activeCard.textContent = activeCard.titleText;
  modal.style.display = "none";
}

/* SUBTAREFAS */
function addSubtask() {
  const txt = prompt("Nome da subtarefa:");
  if (!txt) return;
  activeCard.subtasks.push(txt);
  renderSubtasks();
}

function renderSubtasks() {
  subtasks.innerHTML = "";
  activeCard.subtasks.forEach(s => {
    const div = document.createElement("div");
    div.textContent = "☑️ " + s;
    subtasks.appendChild(div);
  });
}

/* VINCULAR */
function linkTask() {
  const tasks = [];
  document.querySelectorAll(".card").forEach(c => {
    if (c !== activeCard && !c.parentElement.parentElement
      .querySelector(".column-title").textContent.toLowerCase().includes("conclu")) {
      tasks.push(c);
    }
  });

  const names = tasks.map((t,i) => `${i+1} - ${t.titleText}`).join("\n");
  const pick = prompt("Escolha a tarefa para vincular:\n" + names);
  const chosen = tasks[pick-1];
  if (chosen) {
    activeCard.subtasks.push("↳ " + chosen.titleText);
    renderSubtasks();
  }
}
</script>

</body>
</html>
