<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meu Planejador</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

h1 { text-align: center; padding: 10px; }

.top { text-align: center; margin-bottom: 10px; }

button {
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
}

.board {
  display: flex;
  gap: 12px;
  padding: 12px;
  overflow-x: auto;
}

.column {
  background: #1e293b;
  min-width: 240px;
  border-radius: 10px;
  padding: 10px;
}

.column-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: grab;
}

.column-title {
  flex: 1;
  text-align: center;
}

.column-title[contenteditable] { outline: none; }

.cards { min-height: 60px; }

.card {
  background: #334155;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  cursor: grab;
  position: relative;
}

.card.done { background: #16a34a; }

.card .del {
  position: absolute;
  right: 6px;
  top: 4px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>📋 Meu Planejador</h1>

<div class="top">
  <button onclick="addColumn()">+ Nova coluna</button>
</div>

<div class="board" id="board"></div>

<script>
let draggedCard = null;
let draggedColumn = null;
let columnCount = 0;
const maxColumns = 15;

/* COLUNA */
function addColumn() {
  if (columnCount >= maxColumns) return alert("Máx. 15 colunas");

  const column = document.createElement("div");
  column.className = "column";

  const header = document.createElement("div");
  header.className = "column-header";
  header.draggable = true;

  header.ondragstart = () => draggedColumn = column;
  header.ondragover = e => e.preventDefault();
  header.ondrop = () => {
    if (draggedColumn && draggedColumn !== column) {
      board.insertBefore(draggedColumn, column);
      draggedColumn = null;
    }
  };

  const title = document.createElement("div");
  title.className = "column-title";
  title.contentEditable = true;
  title.textContent = "Nova coluna";

  const delCol = document.createElement("span");
  delCol.textContent = "🗑️";
  delCol.onclick = () => {
    if (confirm("Excluir coluna?")) column.remove();
  };

  header.appendChild(title);
  header.appendChild(delCol);

  const cards = document.createElement("div");
  cards.className = "cards";
  cards.ondragover = e => e.preventDefault();
  cards.ondrop = () => dropCard(cards, title);

  const btn = document.createElement("button");
  btn.textContent = "+ Tarefa";
  btn.onclick = () => addCard(cards);

  column.append(header, cards, btn);
  board.appendChild(column);
  columnCount++;
}

/* CARTÃO */
function addCard(container) {
  const card = document.createElement("div");
  card.className = "card";
  card.contentEditable = true;
  card.textContent = "Nova tarefa";
  card.draggable = true;

  card.ondragstart = () => draggedCard = card;

  const del = document.createElement("span");
  del.className = "del";
  del.textContent = "❌";
  del.onclick = () => {
    if (confirm("Excluir tarefa?")) card.remove();
  };

  card.appendChild(del);
  container.appendChild(card);
}

/* SOLTAR CARTÃO */
function dropCard(container, title) {
  if (!draggedCard) return;

  draggedCard.classList.remove("done");

  if (title.textContent.toLowerCase().includes("conclu")) {
    const complemento = confirm("Essa tarefa é complemento de outra?");
    if (!complemento) {
      draggedCard.classList.add("done");
    } else {
      alert("Complemento cancelado (mantida separada)");
      draggedCard.classList.add("done");
    }
  }

  container.appendChild(draggedCard);
  draggedCard = null;
}

/* inicial */
addColumn();
</script>

</body>
</html>
